name: 1 — Lint, Type-check & Test                                                                                    
                                                                                                                       
  on:
    pull_request:                                                                                                      
    push:                                                         
      branches: [main]

  jobs:
    lint:
      runs-on: ubuntu-latest
      steps:                                                                                                           
        - uses: actions/checkout@v4
        - uses: actions/setup-python@v5                                                                                
          with:                                                   
            python-version: "3.12"
        - run: pip install -e ".[dev]"                                                                                 
        - run: ruff check src/ tests/
        - run: ruff format --check src/ tests/                                                                         
                                                                  
    typecheck:                                                                                                         
      runs-on: ubuntu-latest
      needs: lint                                                                                                      
      steps:                                                      
        - uses: actions/checkout@v4
        - uses: actions/setup-python@v5
          with:
            python-version: "3.12"
        - run: pip install -e ".[dev]"
        - run: mypy src/aio/                                                                                           
   
    test:                                                                                                              
      runs-on: ubuntu-latest                                      
      needs: typecheck
      steps:
        - uses: actions/checkout@v4
        - uses: actions/setup-python@v5                                                                                
          with:
            python-version: "3.12"                                                                                     
        - run: pip install -e ".[dev]"                            
        - run: pytest --cov=src/aio --cov-report=term-missing --cov-fail-under=20
