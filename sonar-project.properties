sonar.projectKey=renatobardi_aio
sonar.organization=renatobardi

sonar.sources=src
sonar.tests=tests
sonar.python.version=3.12

# Exclude test files from security hotspot detection:
# - S5332 (HTTP protocol): test fixtures use http://test as base URL — no real network
# - S5852 (ReDoS): patterns applied to known-size fixture data, not user input
# - S5443 (temp dir): test-only path arguments, no actual file creation
sonar.issue.ignore.multicriteria=e1,e2,e3
sonar.issue.ignore.multicriteria.e1.ruleKey=python:S5332
sonar.issue.ignore.multicriteria.e1.resourceKey=tests/**
sonar.issue.ignore.multicriteria.e2.ruleKey=python:S5852
sonar.issue.ignore.multicriteria.e2.resourceKey=tests/**
sonar.issue.ignore.multicriteria.e3.ruleKey=python:S5443
sonar.issue.ignore.multicriteria.e3.resourceKey=tests/**
